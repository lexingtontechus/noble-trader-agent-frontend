name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Build & Lint ──────────────────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint --dir src 2>&1 || true
        # Non-blocking: lint warnings shouldn't block deployment

      - name: Build
        run: npx next build
        env:
          # Minimal env vars needed for build (no real secrets)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_FASTAPI_BASE_URL: http://localhost:8000
          SKIP_ENV_VALIDATION: true

      - name: Check for hardcoded secrets
        run: |
          # Search for common secret patterns (not env var references)
          if rg -n '(api_key|secret|token|password)\s*=\s*["\x27][A-Za-z0-9]{10,}["\x27]' src/ --glob '!*.d.ts' 2>/dev/null; then
            echo "⚠️ Potential hardcoded secrets found! Review the matches above."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

  # ── Security Scan ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for .env files in git
        run: |
          if git ls-files --error-unmatch .env .env.local .env.production 2>/dev/null; then
            echo "❌ .env file is tracked in git! Remove it immediately."
            exit 1
          fi
          echo "✅ No .env files tracked in git"

      - name: Check for exposed API keys
        run: |
          # Check for common API key patterns in source
          patterns=(
            'PK[A-Z0-9]{20,}'        # Alpaca paper key
            'AK[A-Z0-9]{20,}'        # Alpaca live key
            'sk_live_[a-zA-Z0-9]{20,}' # Stripe live key
            'ghp_[a-zA-Z0-9]{36}'     # GitHub PAT
            'xox[bpsa]-[a-zA-Z0-9-]+' # Slack token
          )
          for pattern in "${patterns[@]}"; do
            if rg "$pattern" src/ --glob '!*.d.ts' 2>/dev/null; then
              echo "❌ Exposed API key found matching pattern: $pattern"
              exit 1
            fi
          done
          echo "✅ No exposed API keys detected"

  # ── Deployment (main branch only) ────────────────────────────────────────
  deploy:
    name: Deploy Notification
    needs: [build, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "🚀 Deployment Summary"
          echo "========================"
          echo "Commit: ${{ steps.commit.outputs.hash }}"
          echo "Message: ${{ steps.commit.outputs.message }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo ""
          echo "Vercel will auto-deploy the frontend."
          echo "Render will auto-deploy the backend."
          echo ""
          echo "Post-deployment checklist:"
          echo "  1. Verify /api/health returns 200"
          echo "  2. Check /api/health/detailed for system status"
          echo "  3. Run smoke test from Operational page"
